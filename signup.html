      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>

<script>
let userRole = 'client';

// ── If already logged in, redirect ────────────────────
firebase.auth().onAuthStateChanged(user => {
  if (user) window.location.href = 'dashboard.html';
});

function setRole(r, el) {
  userRole = r;
  document.querySelectorAll('.role').forEach(x => x.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('teamBox').classList.toggle('show', r === 'team');
}

function checkStrength(v) {
  const f = document.getElementById('sfill');
  const s = v.length >= 12 && /[A-Z]/.test(v) && /[0-9]/.test(v) ? 4
           : v.length >= 8 && (/[A-Z]/.test(v) || /[0-9]/.test(v)) ? 3
           : v.length >= 6 ? 2 : v.length > 0 ? 1 : 0;
  f.style.width  = (s * 25) + '%';
  f.style.background = ['','#ff6b6b','#f5c842','#4f9fff','#00e5c8'][s];
}

function showErr(m) {
  const e = document.getElementById('errBox');
  e.innerHTML = m; e.style.display = 'block';
  document.getElementById('sucBox').style.display = 'none';
}
function showSuc(m) {
  const e = document.getElementById('sucBox');
  e.textContent = m; e.style.display = 'block';
  document.getElementById('errBox').style.display = 'none';
}

// ── VALIDATE INVITE CODE ──────────────────────────────
async function validateInviteCode(code, email) {
  // Trusted emails skip code check
  if (TRUSTED_TEAM.includes(email.toLowerCase())) return { valid: true, docId: null };

  if (!code || code.length < 4) {
    return { valid: false, error: '❌ Enter the invite code from Siddharth.' };
  }

  try {
    // Sign in anonymously to read Firestore
    if (!firebase.auth().currentUser) {
      await firebase.auth().signInAnonymously();
    }

    const snap = await firebase.firestore()
      .collection('inviteCodes')
      .where('code', '==', code.toUpperCase())
      .limit(1)
      .get();

    if (snap.empty) {
      return { valid: false, error: '❌ Invalid invite code. Ask Siddharth to generate one for you.' };
    }

    const data = snap.docs[0].data();

    if (data.status === 'used') {
      return { valid: false, error: '❌ This code has already been used. Ask Siddharth for a new one.' };
    }

    if (data.expiresAt && data.expiresAt.toDate() < new Date()) {
      return { valid: false, error: '❌ This invite code has expired. Ask Siddharth to generate a new one.' };
    }

    return { valid: true, docId: snap.docs[0].id };

  } catch(e) {
    console.error('Invite code check error:', e);
    return { valid: false, error: '❌ Could not verify code. Check internet connection and try again.' };
  }
}

// ── MAIN SIGNUP ───────────────────────────────────────
async function doSignup() {
  const fn    = document.getElementById('fname').value.trim();
  const ln    = document.getElementById('lname').value.trim();
  const ph    = document.getElementById('phone').value.trim();
  const em    = document.getElementById('email').value.trim().toLowerCase();
  const pw    = document.getElementById('pwd').value;
  const cpw   = document.getElementById('cpwd').value;
  const code  = document.getElementById('inviteCode').value.trim();

  // Validation
  if (!fn)       { showErr('Please enter your first name.'); return; }
  if (!ph)       { showErr('Please enter your phone number.'); return; }
  if (!em)       { showErr('Please enter your email address.'); return; }
  if (!pw)       { showErr('Please enter a password.'); return; }
  if (pw.length < 8) { showErr('Password must be at least 8 characters.'); return; }
  if (pw !== cpw)    { showErr('Passwords do not match.'); return; }

  const btn = document.getElementById('signupBtn');
  btn.disabled = true; btn.textContent = 'Creating account...';

  // Validate invite code for team members
  let inviteCodeDocId = null;
  if (userRole === 'team') {
    btn.textContent = 'Checking invite code...';
    const result = await validateInviteCode(code, em);
    if (!result.valid) {
      showErr(result.error);
      btn.disabled = false; btn.textContent = 'Create Account →';
      return;
    }
    inviteCodeDocId = result.docId;
  }

  btn.textContent = 'Creating account...';

  try {
    // Sign out anonymous session if exists
    const currentUser = firebase.auth().currentUser;
    if (currentUser && currentUser.isAnonymous) {
      await firebase.auth().signOut();
    }

    // Create Firebase Auth account
    const cred = await firebase.auth().createUserWithEmailAndPassword(em, pw);
    await cred.user.updateProfile({ displayName: fn + (ln ? ' ' + ln : '') });

    const fullName = fn + (ln ? ' ' + ln : '');
    const role     = TRUSTED_TEAM.includes(em) ? 'team' : userRole;

    // Save to Firestore (with retry)
    const userData = {
      name     : fullName,
      firstName: fn,
      lastName : ln,
      phone    : ph,
      email    : em,
      role     : role,
      photo    : '',
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      tempPassword: btoa(pw)  // for OTP fallback
    };

    // Try saving — retry if fails
    for (let attempt = 0; attempt < 3; attempt++) {
      try {
        await firebase.firestore().collection('users').doc(cred.user.uid).set(userData);
        break;
      } catch(fsErr) {
        if (attempt === 2) console.log('Firestore save failed after 3 attempts');
        await new Promise(r => setTimeout(r, 1000));
      }
    }

    // Mark invite code as used
    if (inviteCodeDocId) {
      firebase.firestore().collection('inviteCodes').doc(inviteCodeDocId).update({
        status : 'used',
        usedBy : em,
        usedAt : firebase.firestore.FieldValue.serverTimestamp()
      }).catch(() => {});
    }

    // Notify team via SMS
    alertSMS(`👤 New Signup - Amol Soft!\nName: ${fullName}\nPhone: ${ph}\nEmail: ${em}\nRole: ${role}\nTime: ${new Date().toLocaleString('en-IN')}`);

    // Cache in localStorage
    localStorage.setItem('asdi_user', JSON.stringify({ email: em, role, name: fullName }));

    showSuc('✅ Account created! Taking you to dashboard...');
    setTimeout(() => window.location.href = 'dashboard.html', 800);

  } catch(e) {
    btn.disabled = false; btn.textContent = 'Create Account →';
    const codes = {
      'auth/email-already-in-use': '❌ An account with this email already exists. <a href="login.html" style="color:#4f9fff;">Login instead →</a>',
      'auth/weak-password'       : '❌ Password is too weak. Use at least 8 characters with numbers.',
      'auth/invalid-email'       : '❌ Invalid email address. Check and try again.',
      'auth/network-request-failed': '❌ No internet connection. Check your network.',
      'auth/too-many-requests'   : '❌ Too many attempts. Please wait a few minutes.'
    };
    showErr(codes[e.code] || '❌ Signup failed: ' + e.message);
  }
}

// ── GOOGLE SIGNUP ─────────────────────────────────────
async function googleSignup() {
  if (userRole === 'team') {
    const code  = document.getElementById('inviteCode').value.trim();
    const email = '';  // unknown before Google popup
    const btn   = document.getElementById('signupBtn');
    // For Google + team, check code first
    if (!code) {
      showErr('Please enter your invite code before signing up with Google as Team Member.');
      return;
    }
  }

  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    const result   = await firebase.auth().signInWithPopup(provider);
    const user     = result.user;
    const em       = user.email.toLowerCase();
    const role     = TRUSTED_TEAM.includes(em) ? 'team' : userRole;

    if (userRole === 'team' && !TRUSTED_TEAM.includes(em)) {
      const code   = document.getElementById('inviteCode').value.trim();
      const result2 = await validateInviteCode(code, em);
      if (!result2.valid) {
        await firebase.auth().signOut();
        showErr(result2.error); return;
      }
      if (result2.docId) {
        firebase.firestore().collection('inviteCodes').doc(result2.docId).update({
          status: 'used', usedBy: em, usedAt: firebase.firestore.FieldValue.serverTimestamp()
        }).catch(() => {});
      }
    }

    await firebase.firestore().collection('users').doc(user.uid).set({
      name: user.displayName, email: em, photo: user.photoURL || '',
      role, createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });

    alertSMS(`👤 Google Signup - Amol Soft!\nName: ${user.displayName}\nEmail: ${em}\nRole: ${role}`);
    localStorage.setItem('asdi_user', JSON.stringify({ email: em, role, name: user.displayName }));
    window.location.href = 'dashboard.html';

  } catch(e) {
    if (e.code !== 'auth/popup-closed-by-user') showErr('Google signup failed: ' + e.message);
  }
}

// ── SMS ALERT ─────────────────────────────────────────
async function alertSMS(msg) {
  try {
    await fetch(
      `https://www.fast2sms.com/dev/bulkV2?authorization=${FAST2SMS_KEY}&route=q&message=${encodeURIComponent(msg)}&flash=0&numbers=${TEAM_SMS}`,
      { method: 'GET', headers: { 'cache-control': 'no-cache' } }
    );
  } catch(e) { /* silent */ }
}
</script>
